<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f27121;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Book icon -->
  <g transform="translate(60, 55)">
    <path d="M0 10 L0 80 L35 90 L70 80 L70 10 L35 0 Z" fill="none" stroke="url(#iconGrad)" stroke-width="3"/>
    <path d="M35 0 L35 90" fill="none" stroke="url(#iconGrad)" stroke-width="2"/>
    <path d="M10 20 L30 25" stroke="#4facfe" stroke-width="2" opacity="0.7"/>
    <path d="M10 35 L30 40" stroke="#4facfe" stroke-width="2" opacity="0.7"/>
    <path d="M10 50 L30 55" stroke="#4facfe" stroke-width="2" opacity="0.7"/>
    <path d="M40 25 L60 20" stroke="#00f2fe" stroke-width="2" opacity="0.7"/>
    <path d="M40 40 L60 35" stroke="#00f2fe" stroke-width="2" opacity="0.7"/>
    <path d="M40 55 L60 50" stroke="#00f2fe" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Arrow -->
  <g transform="translate(150, 85)">
    <path d="M0 15 L40 15 L30 5 M40 15 L30 25" fill="none" stroke="#e94560" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Film/Video icon -->
  <g transform="translate(200, 55)">
    <rect x="0" y="10" width="70" height="70" rx="5" fill="none" stroke="url(#iconGrad)" stroke-width="3"/>
    <circle cx="35" cy="45" r="18" fill="none" stroke="#4facfe" stroke-width="2"/>
    <polygon points="30,38 30,52 45,45" fill="#00f2fe"/>
    <!-- Film holes -->
    <rect x="5" y="15" width="8" height="6" rx="1" fill="#4facfe" opacity="0.5"/>
    <rect x="5" y="69" width="8" height="6" rx="1" fill="#4facfe" opacity="0.5"/>
    <rect x="57" y="15" width="8" height="6" rx="1" fill="#00f2fe" opacity="0.5"/>
    <rect x="57" y="69" width="8" height="6" rx="1" fill="#00f2fe" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="310" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="url(#textGrad)">
    StoryCanvas
  </text>

  <!-- Tagline -->
  <text x="310" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a0a0a0">
    Transform books into cinematic videos with AI
  </text>

  <!-- Tech badges -->
  <g transform="translate(310, 145)">
    <rect x="0" y="0" width="70" height="22" rx="4" fill="#e94560" opacity="0.2"/>
    <text x="35" y="15" font-family="monospace" font-size="11" fill="#e94560" text-anchor="middle">Gemini</text>

    <rect x="80" y="0" width="70" height="22" rx="4" fill="#4facfe" opacity="0.2"/>
    <text x="115" y="15" font-family="monospace" font-size="11" fill="#4facfe" text-anchor="middle">Imagen 4</text>

    <rect x="160" y="0" width="50" height="22" rx="4" fill="#00f2fe" opacity="0.2"/>
    <text x="185" y="15" font-family="monospace" font-size="11" fill="#00f2fe" text-anchor="middle">TTS</text>

    <rect x="220" y="0" width="50" height="22" rx="4" fill="#f27121" opacity="0.2"/>
    <text x="245" y="15" font-family="monospace" font-size="11" fill="#f27121" text-anchor="middle">Veo</text>
  </g>

  <!-- Decorative elements -->
  <circle cx="720" cy="40" r="3" fill="#4facfe" opacity="0.6"/>
  <circle cx="750" cy="60" r="2" fill="#e94560" opacity="0.6"/>
  <circle cx="730" cy="80" r="4" fill="#00f2fe" opacity="0.4"/>
  <circle cx="760" cy="140" r="3" fill="#f27121" opacity="0.5"/>
  <circle cx="740" cy="160" r="2" fill="#4facfe" opacity="0.6"/>
</svg>
